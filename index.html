<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Morning Affirmations</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital@0;1&family=Raleway:wght@400;600&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="container">

    <img src="sunrise.jpeg" alt="Sunrise" id="sunrise-img" />
    <h1>Morning Affirmations</h1>
    <p class="subtitle">Start your day with intention.</p>

    <div class="card" id="affirmation-card">
      <p id="affirmation-text">Click the button to get your affirmation for today.</p>
    </div>

    <div class="buttons">
      <button id="new-btn">New Affirmation</button>
      <button id="save-btn">Save This One</button>
    </div>

    <p id="counter">Affirmations viewed: <span id="count">0</span></p>

    <div id="saved-section">
      <h2>Saved Affirmations</h2>
      <ul id="saved-list"></ul>
      <button id="clear-btn">Clear Saved</button>
    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
